<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0118">
<title>IZURIC65 - WEATHER STATION</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: linear-gradient(180deg, #050010 0%, #1a0033 28%, #2d0a4e 52%, #6e1257 70%, #ff2a6d 80%, #ff006e 83%, #2a0540 85%, #050010 100%);
  font-family: 'Orbitron', 'Courier New', monospace;
  color: #fff;
  overflow-x: hidden;
  position: relative;
}

.scene {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

.content {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 26px 36px;
  max-width: 1100px;
  margin: 0 auto;
}

header.bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-weight: 500;
}

.station-name { color: #00f0ff; text-shadow: 0 0 10px #00f0ff; }
.live { color: #ff19a8; text-shadow: 0 0 10px #ff19a8; animation: pulse 1.6s ease-in-out infinite; }

.header-right { display: flex; align-items: center; gap: 14px; }
.theme-toggle {
  display: inline-flex;
  border: 1px solid #00f0ff;
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 0 6px rgba(0, 240, 255, 0.35);
}
.theme-toggle button {
  background: transparent;
  border: 0;
  color: #00f0ff;
  font-family: inherit;
  font-size: 10px;
  letter-spacing: 0.18em;
  padding: 4px 9px;
  cursor: pointer;
  text-transform: uppercase;
  font-weight: 500;
  text-shadow: 0 0 4px #00f0ff;
}
.theme-toggle button + button { border-left: 1px solid rgba(0, 240, 255, 0.55); }
.theme-toggle button.active {
  background: rgba(0, 240, 255, 0.22);
  color: #fff;
  text-shadow: 0 0 6px #00f0ff, 0 0 12px #00f0ff;
}

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

.center {
  text-align: center;
  margin: 50px 0 30px;
}

.temp {
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  font-size: clamp(96px, 17vw, 180px);
  font-weight: 400;
  letter-spacing: -0.04em;
  line-height: 0.9;
  text-shadow: 0 0 12px #ff00ff, 0 0 28px #ff00ff, 0 0 48px #ff007a, 0 0 80px #ff007a;
}

.feels {
  font-size: 14px;
  color: #fff;
  letter-spacing: 0.3em;
  margin-top: 18px;
  /* Yellow halo + dark outer halo so it reads on any background, including the sun. */
  text-shadow: 0 0 6px #ffea00, 0 0 12px rgba(0, 0, 0, 0.85);
  font-weight: 500;
}

.grid {
  margin-top: auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  padding-top: 24px;
}

.card {
  border: 1px solid;
  padding: 14px 16px;
  background: rgba(5, 0, 20, 0.55);
  border-radius: 4px;
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
}

.card .label {
  font-size: 11px;
  letter-spacing: 0.25em;
  font-weight: 500;
}

.card .val {
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  font-size: 32px;
  font-weight: 400;
  margin-top: 4px;
  color: #fff;
}

.card .unit {
  font-size: 12px;
  letter-spacing: 0.1em;
  margin-left: 4px;
  opacity: 0.85;
}

.c-cyan   { border-color: #00f0ff; box-shadow: 0 0 10px rgba(0, 240, 255, 0.4); }
.c-cyan   .label { color: #00f0ff; text-shadow: 0 0 5px #00f0ff; }
.c-pink   { border-color: #ff19a8; box-shadow: 0 0 10px rgba(255, 25, 168, 0.4); }
.c-pink   .label { color: #ff19a8; text-shadow: 0 0 5px #ff19a8; }
.c-yellow { border-color: #ffea00; box-shadow: 0 0 10px rgba(255, 234, 0, 0.35); }
.c-yellow .label { color: #ffea00; text-shadow: 0 0 5px #ffea00; }
.c-purple { border-color: #b388ff; box-shadow: 0 0 10px rgba(179, 136, 255, 0.4); }
.c-purple .label { color: #b388ff; text-shadow: 0 0 5px #b388ff; }

.trend {
  display: inline-block;
  margin-left: 0.2em;
  font-size: 0.5em;
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  vertical-align: 0.2em;
  opacity: 0;
  transition: opacity 0.3s, color 0.3s;
}
.temp  .trend { font-size: 0.28em; vertical-align: 0.4em; margin-left: 0.18em; }
.feels .trend { font-size: 1em;    vertical-align: 0;     margin-left: 0.5em; }
.trend.up   { color: #ff19a8; text-shadow: 0 0 6px #ff19a8; opacity: 0.85; }
.trend.down { color: #00f0ff; text-shadow: 0 0 6px #00f0ff; opacity: 0.85; }

/* If the API doesn't return a value, drop the whole card from the grid. */
.card.no-data { display: none; }

/* Skyline is teletext-only; hidden by default in the synthwave theme. */
.skyline { display: none; }

.wind-card .wind-body {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 6px;
}
.wind-card .val { margin-top: 0; }
.compass-svg {
  width: 72px;
  height: 72px;
  flex-shrink: 0;
  filter: drop-shadow(0 0 3px rgba(255, 25, 168, 0.35));
}
#wind-needle {
  transform-origin: 50px 50px;
  transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s ease;
  filter: drop-shadow(0 0 2px #ff19a8) drop-shadow(0 0 5px #ff19a8);
}
#wind-needle.no-dir { opacity: 0.2; }
.wind-stats { flex: 1; min-width: 0; }
.wind-dir {
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.18em;
  color: #ff19a8;
  text-shadow: 0 0 4px #ff19a8;
  opacity: 0.75;
  margin-top: 4px;
}

footer.foot {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 18px;
  font-size: 11px;
  letter-spacing: 0.22em;
  color: #b388ff;
  text-shadow: 0 0 4px #b388ff;
  text-transform: uppercase;
  font-weight: 500;
}

.notice {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  padding: 10px 18px;
  background: rgba(255, 25, 80, 0.15);
  border: 1px solid #ff1950;
  color: #ff7a9e;
  font-size: 11px;
  letter-spacing: 0.18em;
  border-radius: 4px;
  display: none;
  text-shadow: 0 0 4px #ff1950;
  text-transform: uppercase;
  font-weight: 500;
}
.notice.show { display: block; }

@media (max-width: 600px) {
  .content { padding: 18px 14px; }
  .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .card { padding: 10px 12px; }
  .card .val { font-size: 22px; }
  .compass-svg { width: 56px; height: 56px; }
  .wind-card .wind-body { gap: 8px; margin-top: 4px; }
  .wind-dir { font-size: 9px; letter-spacing: 0.12em; }
  header.bar { font-size: 10px; letter-spacing: 0.15em; flex-wrap: wrap; gap: 8px; }
  .header-right { gap: 8px; }
  .theme-toggle button { font-size: 9px; padding: 3px 6px; letter-spacing: 0.12em; }
  .feels { font-size: 11px; letter-spacing: 0.22em; }
  footer.foot { font-size: 10px; }
  .center { margin: 26px 0 18px; }
  .temp { font-size: clamp(72px, 22vw, 120px); }
}

/* ╔══════════════════════════════════════════════════╗
   ║  TELETEXT THEME — overrides applied via body.teletext  ║
   ╚══════════════════════════════════════════════════╝ */
body.teletext {
  background: #000;
  font-family: 'VT323', 'Courier New', monospace;
  color: #fff;
  -webkit-font-smoothing: none;
  -moz-osx-font-smoothing: grayscale;
  font-smooth: never;
  text-rendering: geometricPrecision;
  font-feature-settings: "liga" 0;
}
body.teletext::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(to bottom, transparent 0 2px, rgba(255, 255, 255, 0.04) 2px 3px);
  z-index: 99;
}
body.teletext .scene { display: none; }

body.teletext .content { max-width: 960px; padding: 22px 22px; }

body.teletext header.bar {
  font-family: 'VT323', monospace;
  font-size: 26px;
  letter-spacing: 0.03em;
  text-transform: none;
  font-weight: 400;
}
body.teletext .station-name { color: #ffea00; text-shadow: none; }
body.teletext .live { color: #00ff33; text-shadow: none; animation: none; }
body.teletext .theme-toggle {
  border: 1px solid #ffea00;
  border-radius: 0;
  box-shadow: none;
}
body.teletext .theme-toggle button {
  font-family: 'VT323', monospace;
  color: #ffea00;
  font-size: 18px;
  letter-spacing: 0.05em;
  padding: 2px 10px;
  text-shadow: none;
  font-weight: 400;
}
body.teletext .theme-toggle button + button { border-left-color: #ffea00; }
body.teletext .theme-toggle button.active {
  background: #ffea00;
  color: #000;
  text-shadow: none;
}

body.teletext .center {
  border-top: 6px dashed #00f0ff;
  border-bottom: 6px dashed #00f0ff;
  margin: 18px 0 0;
  padding: 18px 0 22px;
}

/* UV and Solar are dropped entirely in teletext, regardless of API value. */
body.teletext .card.c-purple { display: none; }

body.teletext .skyline {
  display: block;
  width: 100%;
  max-width: 720px;
  height: auto;
  margin: 0 auto 12px;
  background: #000;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  border-bottom: 6px dashed #00f0ff;
}
body.teletext .temp {
  font-family: 'VT323', monospace;
  font-size: clamp(96px, 17vw, 170px);
  letter-spacing: 0;
  color: #ffea00;
  text-shadow: none;
  line-height: 1;
}
body.teletext .feels {
  font-family: 'VT323', monospace;
  font-size: 30px;
  letter-spacing: 0.04em;
  color: #fff;
  text-shadow: none;
  margin-top: 4px;
  text-transform: uppercase;
  font-weight: 400;
}
body.teletext .feels #feels { color: #ffea00; }

body.teletext .grid {
  grid-template-columns: 1fr 1fr;
  gap: 4px 36px;
  padding-top: 8px;
  font-family: 'VT323', monospace;
}
body.teletext .card {
  background: transparent;
  border: 0;
  box-shadow: none;
  border-radius: 0;
  padding: 4px 0;
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
  display: grid;
  grid-template-columns: 170px 1fr;
  align-items: baseline;
  column-gap: 14px;
}
body.teletext .card .label {
  color: #00f0ff;
  text-shadow: none;
  font-family: 'VT323', monospace;
  font-size: 26px;
  letter-spacing: 0.04em;
  font-weight: 400;
  text-transform: uppercase;
}
body.teletext .card .val {
  font-family: 'VT323', monospace;
  font-size: 30px;
  margin-top: 0;
  color: #ffea00;
}
body.teletext .card .unit {
  font-size: 22px;
  letter-spacing: 0;
  margin-left: 6px;
  color: #ffea00;
  opacity: 0.85;
}

body.teletext .wind-card { align-items: center; }
body.teletext .wind-card .label { align-self: center; }
body.teletext .wind-body { gap: 14px; margin-top: 0; }
body.teletext .compass-svg {
  width: 60px;
  height: 60px;
  filter: none;
}
body.teletext .compass-svg > circle { stroke: #ffea00; }
body.teletext .compass-svg > g[stroke] line { stroke: #ffea00; }
body.teletext .compass-svg text { fill: #ffea00; }
body.teletext #wind-needle line { stroke: #ff19a8; filter: none; }
body.teletext #wind-needle polygon { fill: #ff19a8; }
body.teletext #wind-needle { filter: drop-shadow(0 0 0 transparent); }
body.teletext .wind-dir {
  color: #fff;
  text-shadow: none;
  font-family: 'VT323', monospace;
  font-size: 20px;
  letter-spacing: 0.06em;
  opacity: 0.85;
  margin-top: 2px;
}

body.teletext .trend {
  font-family: 'VT323', monospace;
}
body.teletext .trend.up { color: #ff19a8; text-shadow: none; }
body.teletext .trend.down { color: #00f0ff; text-shadow: none; }
body.teletext .temp .trend { font-size: 0.32em; vertical-align: 0.4em; }
body.teletext .feels .trend { font-size: 1em; }

body.teletext footer.foot {
  color: #fff;
  text-shadow: none;
  font-family: 'VT323', monospace;
  font-size: 24px;
  letter-spacing: 0.06em;
  margin-top: 26px;
  border-top: 2px solid #ffea00;
  padding-top: 10px;
  text-transform: uppercase;
  font-weight: 400;
}

body.teletext .notice {
  background: #cc1818;
  border-color: #cc1818;
  color: #fff;
  font-family: 'VT323', monospace;
  font-size: 22px;
  text-shadow: none;
  letter-spacing: 0.06em;
  border-radius: 0;
}

@media (max-width: 600px) {
  body.teletext .content { padding: 14px 12px; }
  body.teletext header.bar { font-size: 16px; }
  body.teletext .theme-toggle button { font-size: 13px; padding: 2px 6px; }
  body.teletext .center { padding: 10px 0 14px; margin: 12px 0 10px; }
  body.teletext .temp { font-size: clamp(60px, 22vw, 110px); }
  body.teletext .feels { font-size: 18px; }
  body.teletext .grid { grid-template-columns: 1fr; gap: 2px; }
  body.teletext .card { grid-template-columns: 130px 1fr; column-gap: 10px; }
  body.teletext .card .label { font-size: 18px; }
  body.teletext .card .val { font-size: 22px; }
  body.teletext .card .unit { font-size: 16px; }
  body.teletext .compass-svg { width: 48px; height: 48px; }
  body.teletext .wind-dir { font-size: 14px; }
  body.teletext footer.foot { font-size: 16px; margin-top: 14px; }
}
</style>
</head>

<svg class="scene" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sungrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff200"/>

<div class="content">
  <header class="bar">
    <span class="station-name">▶ MAESTRO'S WEATHER STATION · ZÜRICH</span>
    <div class="header-right">
      <div class="theme-toggle" role="group" aria-label="Theme">
        <button type="button" data-theme-set="synthwave">SYNTH</button>
        <button type="button" data-theme-set="teletext">TXT</button>
      </div>
      <span class="live">● LIVE</span>
    </div>
  </header>

  <div class="center">
    <div class="temp"><span id="temp">--.-</span>°<span class="trend" id="temp-tr"></span></div>
    <div class="feels">FEELS LIKE <span id="feels">--.-</span>°<span class="trend" id="feels-tr"></span></div>
  </div>

  <!-- Pixelated Zürich skyline — visible only in teletext mode.
       80×28 unit grid, chunky teletext palette (black sky / yellow stars / magenta
       sunset / green hills / white buildings / cyan lake). Identifiable landmarks:
       Fraumünster spire, St. Peter clock tower, Grossmünster twin towers. -->
  <svg class="skyline" viewBox="0 0 80 28" preserveAspectRatio="xMidYMid meet"
       shape-rendering="crispEdges" aria-hidden="true">
    <!-- Stars -->
    <g fill="#ffea00">
      <rect x="4"  y="1" width="1" height="1"/>
      <rect x="11" y="3" width="1" height="1"/>
      <rect x="18" y="1" width="1" height="1"/>
      <rect x="27" y="4" width="1" height="1"/>
      <rect x="34" y="2" width="1" height="1"/>
      <rect x="42" y="5" width="1" height="1"/>
      <rect x="49" y="1" width="1" height="1"/>
      <rect x="56" y="3" width="1" height="1"/>
      <rect x="63" y="2" width="1" height="1"/>
      <rect x="71" y="4" width="1" height="1"/>
      <rect x="77" y="1" width="1" height="1"/>
    </g>

    <!-- Sunset horizon band -->
    <rect x="0" y="11" width="80" height="1" fill="#ff19a8"/>

    <!-- Distant Alpine hills -->
    <g fill="#00ff33" opacity="0.55">
      <rect x="0"  y="14" width="80" height="3"/>
      <rect x="3"  y="13" width="5"  height="1"/>
      <rect x="14" y="13" width="9"  height="1"/>
      <rect x="29" y="12" width="6"  height="2"/>
      <rect x="44" y="13" width="11" height="1"/>
      <rect x="60" y="13" width="6"  height="1"/>
      <rect x="70" y="12" width="7"  height="2"/>

  <div class="grid">
    <div class="card c-pink wind-card">

          <circle cx="50" cy="50" r="46" fill="none" stroke="#ff19a8" stroke-width="1"   opacity="0.55"/>
          <circle cx="50" cy="50" r="38" fill="none" stroke="#ff19a8" stroke-width="0.5" opacity="0.22"/>
          <g stroke="#ff19a8" stroke-width="1" opacity="0.5">

            <!-- Tail on the outer ring (top), tip at the center: shaft + arrowhead pointing inward. -->

    </div>
    <div class="card c-yellow">
      <div class="label">RAIN RATE</div>
      <div class="val"><span id="rate">--.-</span><span class="unit">mm/h</span><span class="trend" id="rate-tr"></span></div>

<div class="notice" id="notice"></div>

<script>
// ╔══════════════════════════════════════════════════╗
// ║  CONFIG                                          ║
// ╚══════════════════════════════════════════════════╝
const API_KEY    = '2189f14b859f4d7489f14b859ffd7437';
const STATION_ID = 'IZURIC65';
// 90s × 960 polls = full day, leaving ~480 fetches of headroom under the
// 1440/day budget for reloads, manual refreshes, or a second open tab.
const POLL_MS    = 90000;
// Hard ceiling shared across tabs via localStorage. Stops fetching when the
// day's count hits this; resets at the next UTC midnight rollover.
const DAILY_CAP  = 1300;
// ────────────────────────────────────────────────────

const $ = id => document.getElementById(id);
const DIRS = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
const compass = d => DIRS[Math.round(d / 22.5) % 16];
const pad = (n, l = 2) => String(n).padStart(l, '0');

// ── Theme toggle ──────────────────────────────────────
const THEME_KEY = 'wx_theme_v1';
function applyTheme(t) {
  if (t !== 'teletext') t = 'synthwave';
  document.body.classList.toggle('teletext', t === 'teletext');
  document.querySelectorAll('[data-theme-set]').forEach(b => {
    b.classList.toggle('active', b.dataset.themeSet === t);
  });
  try { localStorage.setItem(THEME_KEY, t); } catch (_) {}
}
(function initTheme() {
  let saved = null;
  try { saved = localStorage.getItem(THEME_KEY); } catch (_) {}
  applyTheme(saved || 'synthwave');
  document.querySelectorAll('[data-theme-set]').forEach(b => {
    b.addEventListener('click', () => applyTheme(b.dataset.themeSet));
  });
})();

function notify(msg) {
  const el = $('notice');
  if (!msg) { el.classList.remove('show'); return; }
  el.textContent = msg;
  el.classList.add('show');
}

function hasVal(v) { return v != null && isFinite(v); }

function fmt(val, decimals, dash) {
  if (!hasVal(val)) return dash;
  return decimals > 0 ? Number(val).toFixed(decimals) : String(Math.round(val));
}

// Set a metric value and hide its enclosing .card if the API returned nothing.
function setVal(id, val, decimals, dash) {
  const el = $(id);
  if (!el) return;
  el.textContent = fmt(val, decimals, dash);
  const card = el.closest('.card');
  if (card) card.classList.toggle('no-data', !hasVal(val));
}

// Per-metric noise floor: smaller deltas are treated as flat so the arrow
// doesn't flicker on sensor jitter. Drifts slower than this accumulate
// because prev[key] is only rewritten when an arrow actually flips.
const prev = {};
const TREND_THRESH = {
  temp: 0.1, feels: 0.1, hum: 1, wind: 1, gust: 1,
  press: 0.5, dew: 0.1, rain: 0.1, rate: 0.1, solar: 5, uv: 0.1
};

const QUOTA_KEY = 'wu_quota_v1';

function quotaToday() {
  const today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD UTC
  let raw = null;
  try { raw = JSON.parse(localStorage.getItem(QUOTA_KEY) || 'null'); } catch (_) {}
  return (raw && raw.date === today) ? raw : { date: today, count: 0 };
}

function bumpQuota() {
  const q = quotaToday();
  q.count += 1;
  try { localStorage.setItem(QUOTA_KEY, JSON.stringify(q)); } catch (_) {}
  return q.count;
}

function setTrend(key, current) {
  if (current == null || !isFinite(current)) return;
  const el = $(key + '-tr');
  if (!el) return;
  const last = prev[key];
  if (last == null) { prev[key] = current; return; }
  const thresh = TREND_THRESH[key] ?? 0.1;
  const delta = current - last;
  if (delta > thresh) {
    el.textContent = '▲';
    el.classList.remove('down');
    el.classList.add('up');
    prev[key] = current;
  } else if (delta < -thresh) {
    el.textContent = '▼';
    el.classList.remove('up');
    el.classList.add('down');
    prev[key] = current;
  }
}

async function update() {
  if (API_KEY === 'YOUR_API_KEY_HERE') {
    notify('Set your API_KEY in the HTML file');
    return;
  }
  if (quotaToday().count >= DAILY_CAP) {
    notify('Daily fetch cap reached · resumes 00:00 UTC');
    return;
  }
  try {
    const url = 'https://api.weather.com/v2/pws/observations/current'
              + '?stationId=' + STATION_ID
              + '&format=json&units=m&numericPrecision=decimal'
              + '&apiKey=' + API_KEY;
    bumpQuota();
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    const o = j.observations && j.observations[0];
    if (!o) throw new Error('no data');
    const m = o.metric || {};

    const temp  = m.temp;
    const feels = m.heatIndex ?? m.windChill;
    const hum   = o.humidity;
    const wind  = m.windSpeed;
    const gust  = m.windGust;
    const press = m.pressure;
    const dew   = m.dewpt;
    const rain  = m.precipTotal;
    const rate  = m.precipRate;
    // Stations without UV/solar sensors typically report 0 (not null) — treat
    // 0 as "absent" for these two so the cards drop out via setVal's no-data path.
    const solar = o.solarRadiation || null;
    const uv    = o.uv || null;
    const wdir  = o.winddir;

    $('temp').textContent  = fmt(temp,  1, '--.-');
    $('feels').textContent = fmt(feels, 1, '--.-');
    setVal('hum',   hum,   0, '--');
    setVal('wind',  wind,  0, '--');
    setVal('gust',  gust,  0, '--');
    setVal('press', press, 0, '----');
    setVal('dew',   dew,   1, '--.-');
    setVal('rain',  rain,  1, '--.-');
    setVal('rate',  rate,  1, '--.-');
    setVal('solar', solar, 0, '---');
    setVal('uv',    uv,    1, '--');

    // Compass needle: rotate to wind direction, or dim out if missing.
    const needle = $('wind-needle');
    if (hasVal(wdir)) {
      // wdir is degrees the wind is coming FROM (meteorological convention).
      // The needle's tail sits on the outer ring, tip at the center, so rotating
      // by wdir places the tail at the source bearing — wind flows inward.
      needle.style.transform = 'rotate(' + wdir + 'deg)';
      needle.classList.remove('no-dir');
      $('winddir').textContent = compass(wdir);
      $('winddeg').textContent = pad(Math.round(wdir), 3) + '°';
    } else {
      needle.classList.add('no-dir');
      $('winddir').textContent = '---';
      $('winddeg').textContent = '---°';
    }

    setTrend('temp',  temp);
    setTrend('feels', feels);
    setTrend('hum',   hum);
    setTrend('wind',  wind);
    setTrend('gust',  gust);
    setTrend('press', press);
    setTrend('dew',   dew);
    setTrend('rain',  rain);
    setTrend('rate',  rate);
    setTrend('solar', solar);
    setTrend('uv',    uv);

    const t = o.obsTimeLocal ? new Date(o.obsTimeLocal.replace(' ', 'T')) : new Date();
    $('updated').textContent = pad(t.getHours()) + ':' + pad(t.getMinutes()) + ':' + pad(t.getSeconds());
    notify(null);
  } catch (e) {
    notify('Fetch error · ' + e.message);
    console.error(e);
  }
}

update();
setInterval(update, POLL_MS);
</script>
